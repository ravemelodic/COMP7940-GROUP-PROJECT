version: '3.8'

services:
  # Redis - Message broker for task queue
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - chatbot_network
    restart: unless-stopped

  # Bot Agent - Handles Telegram interactions
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot_bot
    command: python chatbot_agent.py
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
      - ./temp:/comp7940-lab/temp
    networks:
      - chatbot_network
    restart: unless-stopped

  # Video Worker - Processes image-to-video tasks
  video_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python worker.py
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_TYPE=video
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
      - ./temp:/comp7940-lab/temp
    networks:
      - chatbot_network
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # OCR Worker - Processes document analysis tasks
  ocr_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python worker.py
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_TYPE=ocr
    volumes:
      - ./config.ini:/comp7940-lab/config.ini:ro
      - ./logs:/comp7940-lab/logs
      - ./temp:/comp7940-lab/temp
    networks:
      - chatbot_network
    restart: unless-stopped
    deploy:
      replicas: 3  # 增加到 3 个副本
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  
networks:
  chatbot_network:
    driver: bridge

volumes:
  redis_data:
